<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      table {
        width: 600px;
        border-collapse: collapse;
        border: 3px solid black;
        text-align: center;
      }
      th,
      td {
        border: 1px solid black;
        padding: 10px;
      }
      .title {
        font-weight: bold;
        border-bottom: 2px solid black;
      }
      .subtitle {
        font-weight: bold;
      }
      .bottom {
        border-top: 2px solid black;
      }
    </style>
  </head>
  <body>
    <table>
      <tr>
        <th colspan="4" class="title">TITLE</th>
      </tr>

      <tr class="subtitle">
        <td colspan="2">subtitle</td>
        <td colspan="2">subtitle</td>
      </tr>

      <tr>
        <td>
          1 item<br />
          1 item<br />
          1 item
        </td>
        <td>
          123<br />
          123<br />
          123
        </td>
        <td>
          1 item<br />
          1 item<br />
          1 item
        </td>
        <td>
          123<br />
          123<br />
          123
        </td>
      </tr>

      <tr class="bottom">
        <td colspan="2">sub subtitle</td>
        <td colspan="2">sub subtitle</td>
      </tr>
    </table>
  </body>
</html>
